name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Detect domain
        id: meta
        run: |
          DOMAIN=$(python3 -c "
          import json, glob
          f = glob.glob('custom_components/*/manifest.json')[0]
          print(json.load(open(f))['domain'])
          ")
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "manifest=custom_components/$DOMAIN/manifest.json" >> "$GITHUB_OUTPUT"
          echo "zip_name=${DOMAIN}.zip" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          version = tag.lstrip("v")
          p = Path(os.environ["MANIFEST"])

          with p.open() as f:
              m = json.load(f)

          m["version"] = version

          ordered = {
              "domain": m["domain"],
              "name": m["name"],
              **{k: v for k, v in sorted(m.items()) if k not in {"domain", "name"}},
          }

          with p.open("w") as f:
              json.dump(ordered, f, indent=2)
              f.write("\n")

          print(f"Bumped to {version}")
          PY

      - name: Commit and push manifest bump
        id: commit
        env:
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: |
          if git diff --quiet -- "$MANIFEST"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add "$MANIFEST"
          git commit -m "chore: bump manifest version to $RELEASE_TAG"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Move tag to bump commit
        if: steps.commit.outputs.changed == 'true'
        run: |
          git tag -f "$RELEASE_TAG" HEAD
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Create zip asset
        env:
          DOMAIN: ${{ steps.meta.outputs.domain }}
          ZIP: ${{ steps.meta.outputs.zip_name }}
        run: |
          zip -r "$ZIP" "custom_components/$DOMAIN/"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP: ${{ steps.meta.outputs.zip_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$ZIP" \
            --repo "${{ github.repository }}" \
            --clobber
